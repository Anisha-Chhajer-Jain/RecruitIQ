ai_usage_summary: |
  Used DeepMind's Antigravity AI coding assistant to architect the pipeline, refactor for Hackathon compliance, and generate heuristic rules. No candidate data was fed to external LLMs during the ranking phase.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  We implemented a high-performance two-pass offline ranking system.
  Pass 1: A lightweight heuristic rule engine instantly evaluates all 100,000 candidates. It extracts behavioral signals (response rate, completeness) as a multiplier, and explicitly penalizes honeypots (expert skills with 0 months used) and JD disqualifiers (Title Chasers, Consulting-only backgrounds).
  Pass 2: We take the top 1000 candidates from Pass 1 and generate semantic embeddings using 'all-MiniLM-L6-v2' to calculate cosine similarity against the parsed JD requirements. 
  Finally, we combine the scores, sort to find the top 100, and generate dynamic reasoning strings using python logic. The entire pipeline executes in ~36 seconds on CPU.

